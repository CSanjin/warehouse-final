# 仓储系统 Docker 精简部署（课程最低要求）
# 仅 2 个容器：Web 应用 + MySQL 数据库
# 含：自定义网络 warehouse-net + 命名数据卷
#
# 启动：bash docker/start.sh
# 访问：http://<虚拟机IP>/
# 完整微服务集群见 docker-compose.full.yml

version: "3.8"

services:
  # ========== 数据库容器（数据持久化） ==========
  mysql:
    image: mysql:8.0
    container_name: warehouse-mysql
    restart: unless-stopped
    networks:
      warehouse-net:
        ipv4_address: 172.28.0.10
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql-data:/var/lib/mysql
      - mysql-logs:/var/log/mysql
      - ./sql/init-minimal.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ========== Web 应用容器（页面 + REST API） ==========
  warehouse-web:
    build:
      context: .
      dockerfile: docker/Dockerfile.minimal
    image: warehouse-web:minimal
    container_name: warehouse-web
    restart: unless-stopped
    networks:
      warehouse-net:
        ipv4_address: 172.28.0.21
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 80
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/warehouse_goods?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  mysql-data:
    name: warehouse-mysql-data
  mysql-logs:
    name: warehouse-mysql-logs

networks:
  warehouse-net:
    name: warehouse-net
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1
